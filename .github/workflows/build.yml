name: Build Refined Rules
on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * *"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set variables
        run: |
          echo "BUILDTIME=$(TZ=Asia/Shanghai date +'%Y-%m-%d %H:%M')" >> $GITHUB_ENV
          echo "SOURCE_URL=https://static-file-global.353355.xyz/rules/cn-additional-list.txt" >> $GITHUB_ENV
        shell: bash

      - name: Checkout Converter
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/meta-rules-converter
          path: convert

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

- name: Prepare Source File
        run: |
          mkdir -p ./source
          # 直接将下载的文件命名为 custom-cn.txt，工具会以此作为产物前缀
          curl -sSL ${{ env.SOURCE_URL }} | grep -v '^#' | sed '/^$/d' > ./source/custom-cn.txt

      - name: Build Rules (YAML, MRS, JSON, SRS)
        run: |
          mkdir -p ./publish/meta
          mkdir -p ./publish/sing
          
          # 获取当前绝对路径以防转换工具找不到文件
          ROOT_DIR=$(pwd)
          
          cd convert
          
          # 1. 生成 Meta 格式 (默认输出 yaml 和 mrs)
          # 移除 -n 参数，工具会读取文件名 custom-cn
          go run ./ geosite -f $ROOT_DIR/source/custom-cn.txt -o $ROOT_DIR/publish/meta
          
          # 2. 生成 Sing-box 格式 (json 和 srs)
          go run ./ geosite -f $ROOT_DIR/source/custom-cn.txt -o $ROOT_DIR/publish/sing -t sing-box

      - name: Organize Artifacts
        run: |
          mkdir -p ./final_release
          # 根据工具行为，产物通常在指定的 -o 目录下
          # 如果工具生成了子文件夹，请根据实际 ls 结果微调 cp 命令
          cp ./publish/meta/* ./final_release/
          cp ./publish/sing/* ./final_release/
          
          cd ./final_release
          sha256sum * > sha256sum.txt

      - name: Git Push to Release Branch
        run: |
          cd final_release
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add .
          git commit -m "Update rules: ${{ env.BUILDTIME }}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin release